name: Build & Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      - name: Get version info
        id: version
        run: |
          VERSION=$(grep 'versionName = "' app/build.gradle.kts | grep -oP '(?<=")[^"]+(?=")')
          VCODE=$(grep 'versionCode = ' app/build.gradle.kts | grep -oP '\d+')
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "VCODE=$VCODE" >> "$GITHUB_OUTPUT"

      - name: Get release notes
        id: notes
        run: |
          NOTES=$(python3 -c "
          import json
          with open('version.json') as f:
              d = json.load(f)
          print(d.get('releaseNotes','').replace('\\\\n', '\n'))
          ")
          echo "NOTES<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Build release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Update and commit version.json
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          VCODE=${{ steps.version.outputs.VCODE }}
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          APK_URL="https://github.com/${REPO}/releases/download/${TAG}/${VERSION}.apk"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main

          python3 -c "
          import json
          with open('version.json', 'r') as f:
              d = json.load(f)
          d['versionCode'] = int('${VCODE}')
          d['versionName'] = '${VERSION}'
          d['apkUrl'] = '${APK_URL}'
          with open('version.json', 'w') as f:
              json.dump(d, f, ensure_ascii=False, indent=2)
          "

          git add version.json
          git diff --staged --quiet || git commit -m "chore: update version.json for ${TAG} [skip ci]"
          git push origin main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ steps.version.outputs.VERSION }}
          body: ${{ steps.notes.outputs.NOTES }}
          files: app/build/outputs/apk/release/${{ steps.version.outputs.VERSION }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
